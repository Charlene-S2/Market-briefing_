<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마켓 브리핑 — 실시간 금융 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080e0a;
    --surface:  #0d1610;
    --surface2: #132016;
    --border:   rgba(0,255,100,0.08);
    --border2:  rgba(0,255,100,0.18);
    --text:     #d4f5dc;
    --text2:    #7aab87;
    --text3:    #3d6647;
    --green:    #00e676;
    --green-bg: rgba(0,230,118,0.1);
    --red:      #ff5252;
    --red-bg:   rgba(255,82,82,0.1);
    --accent:   #00c853;
    --accent2:  #69f0ae;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,100,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,100,0.015) 1px, transparent 1px);
    background-size: 32px 32px; pointer-events: none; z-index: 0;
  }
  .page { position: relative; z-index: 1; max-width: 920px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border2); }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 32px; height: 32px; border: 1.5px solid var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 16px; height: 16px; }
  .logo-text { font-size: 17px; font-weight: 600; color: var(--accent2); letter-spacing: -0.01em; font-family: var(--mono); }
  .logo-sub  { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .live-badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; color: var(--accent); background: var(--green-bg); border: 1px solid rgba(0,200,83,0.3); padding: 3px 9px; border-radius: 3px; letter-spacing: 0.08em; }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .last-updated { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-title { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--mono); }
  .section-title::before { content: '> '; color: var(--accent); }
  .section-badge { font-size: 10px; font-family: var(--mono); color: var(--text3); border: 1px solid var(--border2); padding: 2px 8px; border-radius: 3px; }

  .ticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; margin-bottom: 1.75rem; }
  .ticker-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px 18px; transition: border-color 0.2s, background 0.2s; animation: fadeUp 0.35s ease both; position: relative; overflow: hidden; }
  .ticker-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,230,118,0.15), transparent); }
  .ticker-card:hover { border-color: var(--border2); background: var(--surface2); }
  .ticker-card.up-card   { border-left: 2px solid var(--green); }
  .ticker-card.down-card { border-left: 2px solid var(--red); }
  @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

  .t-label { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-bottom: 10px; letter-spacing: 0.05em; }
  .t-value { font-size: 24px; font-weight: 500; font-family: var(--mono); color: var(--accent2); letter-spacing: -0.02em; margin-bottom: 8px; line-height: 1; }
  .t-sub   { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 5px; }
  .t-change { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-family: var(--mono); font-weight: 500; padding: 2px 7px; border-radius: 3px; }
  .t-change.up   { color: var(--green); background: var(--green-bg); }
  .t-change.down { color: var(--red);   background: var(--red-bg); }
  .t-change.flat { color: var(--text3); background: rgba(255,255,255,0.03); }

  .skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.8s infinite; border-radius: 3px; }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }

  .news-list { display: flex; flex-direction: column; gap: 6px; }
  .news-card { background: var(--surface); border: 1px solid var(--border); border-left: 2px solid transparent; border-radius: 6px; padding: 15px 18px; display: flex; gap: 16px; transition: border-color 0.2s, background 0.2s; animation: fadeUp 0.35s ease both; cursor: pointer; text-decoration: none; }
  .news-card:hover { border-color: var(--border2); background: var(--surface2); border-left-color: var(--accent); }
  .news-index { font-family: var(--mono); font-size: 12px; color: var(--text3); min-width: 22px; padding-top: 2px; }
  .news-body { flex: 1; min-width: 0; }
  .news-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .news-tag { font-size: 10px; font-family: var(--mono); font-weight: 500; padding: 1px 7px; border-radius: 3px; letter-spacing: 0.06em; }
  .tag-kr  { background: rgba(0,200,83,0.12);  color: #69f0ae; border: 1px solid rgba(0,200,83,0.25); }
  .tag-us  { background: rgba(0,176,255,0.1);  color: #40c4ff; border: 1px solid rgba(0,176,255,0.2); }
  .tag-eco { background: rgba(255,214,0,0.08); color: #ffd740; border: 1px solid rgba(255,214,0,0.2); }
  .news-source { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .news-time   { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .news-headline { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.5; margin-bottom: 4px; }
  .news-summary  { font-size: 12px; color: var(--text2); line-height: 1.6; }

  .refresh-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-family: var(--mono); color: var(--text3); background: transparent; border: 1px solid var(--border2); padding: 4px 12px; border-radius: 3px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
  .refresh-btn:hover { color: var(--accent2); border-color: var(--accent); }
  .spin-icon { display: inline-block; }
  .spinning .spin-icon { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state { display: flex; align-items: center; gap: 8px; color: var(--text3); font-size: 12px; font-family: var(--mono); padding: 8px 0; }
  .spinner { width: 13px; height: 13px; border: 1.5px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .error-state { font-size: 12px; color: var(--red); font-family: var(--mono); padding: 6px 0; }

  footer { margin-top: 3rem; padding-top: 1.25rem; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); font-family: var(--mono); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }

  @media (max-width: 600px) {
    .ticker-grid { grid-template-columns: repeat(2, 1fr); }
    header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .t-value { font-size: 19px; }
    .news-card { padding: 13px 14px; }
  }
</style>
</head>

<script>
// ── 유틸 ──────────────────────────────────────────────────────────────
function nowStr() {
  return new Date().toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function dirCls(chg)   { return chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat'; }
function dirArrow(chg) { return chg > 0 ? '▲' : chg < 0 ? '▼' : '—'; }

function tickerCard(label, value, chgPct, delay, sub) {
  const c = dirCls(chgPct), sign = chgPct > 0 ? '+' : '', tb = c==='up'?'up-card':c==='down'?'down-card':'';
  return `<div class="ticker-card ${tb}" style="animation-delay:${delay}s">
    <div class="t-label">${label}</div>
    <div class="t-value">${value}</div>
    <span class="t-change ${c}">${dirArrow(chgPct)} ${sign}${Math.abs(chgPct).toFixed(2)}%</span>
    ${sub ? `<div class="t-sub">${sub}</div>` : ''}
  </div>`;
}
function skelCard() {
  return `<div class="ticker-card"><div class="skeleton" style="height:11px;width:55px;margin-bottom:12px"></div><div class="skeleton" style="height:26px;width:110px;margin-bottom:10px"></div><div class="skeleton" style="height:18px;width:55px"></div></div>`;
}
function setTimestamps() {
  const t = nowStr();
  document.getElementById('last-updated').textContent = t + ' 기준';
  document.getElementById('footer-time').textContent  = t + ' 업데이트';
}

// ── 환율: Frankfurter (유럽중앙은행 공식 데이터, CORS OK, 실시간) ────
// 전일 대비 변동률 계산을 위해 오늘 + 어제 데이터 동시 요청
async function loadFX() {
  document.getElementById('fx-grid').innerHTML = [1,2,3,4].map(skelCard).join('');
  try {
    const today     = new Date();
    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);
    const fmt = d => d.toISOString().split('T')[0];

    // 오늘과 어제 환율 동시 요청
    const [resToday, resYest] = await Promise.all([
      fetch(`https://api.frankfurter.app/latest?from=USD&to=KRW,EUR,JPY,CNY`),
      fetch(`https://api.frankfurter.app/${fmt(yesterday)}?from=USD&to=KRW,EUR,JPY,CNY`)
    ]);
    const [dataToday, dataYest] = await Promise.all([resToday.json(), resYest.json()]);

    const r  = dataToday.rates;   // 오늘
    const ry = dataYest.rates;    // 어제

    // USD/KRW 변동률
    const usdKrw     = r.KRW;
    const usdKrwYest = ry.KRW;
    const usdChg     = ((usdKrw - usdKrwYest) / usdKrwYest) * 100;

    // EUR/KRW = KRW / EUR (USD 기준이므로 교차 계산)
    const eurKrw     = r.KRW  / r.EUR;
    const eurKrwYest = ry.KRW / ry.EUR;
    const eurChg     = ((eurKrw - eurKrwYest) / eurKrwYest) * 100;

    // JPY/KRW (100엔 기준)
    const jpyKrw     = (r.KRW  / r.JPY)  * 100;
    const jpyKrwYest = (ry.KRW / ry.JPY) * 100;
    const jpyChg     = ((jpyKrw - jpyKrwYest) / jpyKrwYest) * 100;

    // CNY/KRW
    const cnyKrw     = r.KRW  / r.CNY;
    const cnyKrwYest = ry.KRW / ry.CNY;
    const cnyChg     = ((cnyKrw - cnyKrwYest) / cnyKrwYest) * 100;

    const items = [
      { label:'USD / KRW', value: Math.round(usdKrw).toLocaleString('ko-KR') + ' ₩', chg: usdChg, sub:'1 USD' },
      { label:'EUR / KRW', value: Math.round(eurKrw).toLocaleString('ko-KR') + ' ₩', chg: eurChg, sub:'1 EUR' },
      { label:'JPY / KRW', value: jpyKrw.toFixed(1) + ' ₩',                          chg: jpyChg, sub:'100 JPY' },
      { label:'CNY / KRW', value: cnyKrw.toFixed(1) + ' ₩',                          chg: cnyChg, sub:'1 CNY' },
    ];

    document.getElementById('fx-grid').innerHTML = items.map((f,i) => tickerCard(f.label, f.value, f.chg, i*0.07, f.sub)).join('');
    document.getElementById('fx-badge').textContent = 'Frankfurter ECB';
    setTimestamps();
  } catch(e) {
    document.getElementById('fx-grid').innerHTML = `<div class="error-state">환율 로드 실패: ${e.message}</div>`;
  }
}

// ── 지수: Yahoo Finance v8 (CORS 허용 엔드포인트) ───────────────────
// corsproxy.io 경유로 안정적으로 우회
async function loadIndices() {
  document.getElementById('index-grid').innerHTML = [1,2,3,4].map(skelCard).join('');

  const symbols = [
    { sym: '%5EKS11', label: 'KOSPI',   dec: 2 },
    { sym: '%5EKQ11', label: 'KOSDAQ',  dec: 2 },
    { sym: '%5EGSPC', label: 'S&P 500', dec: 2 },
    { sym: '%5EIXIC', label: 'NASDAQ',  dec: 2 },
  ];

  async function fetchYahoo(encodedSym) {
    const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodedSym}?interval=1d&range=5d`;
    const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(yahooUrl)}`;
    const res  = await fetch(proxyUrl);
    const data = await res.json();
    const result = data?.chart?.result?.[0];
    if (!result) throw new Error('no result');
    const meta   = result.meta;
    const price  = meta.regularMarketPrice;
    const prev   = meta.chartPreviousClose ?? meta.previousClose;
    const chgPct = prev ? ((price - prev) / prev) * 100 : 0;
    return { price, chgPct };
  }

  const results = await Promise.allSettled(symbols.map(s => fetchYahoo(s.sym)));

  document.getElementById('index-grid').innerHTML = results.map((r, i) => {
    const s = symbols[i];
    if (r.status === 'fulfilled') {
      const { price, chgPct } = r.value;
      const display = price.toLocaleString('ko-KR', { minimumFractionDigits: s.dec, maximumFractionDigits: s.dec });
      return tickerCard(s.label, display, chgPct, i * 0.07, '');
    }
    return tickerCard(s.label, '로드 실패', 0, i * 0.07, '새로고침 해주세요');
  }).join('');

  document.getElementById('idx-badge').textContent = 'Yahoo Finance';
}

// ── 뉴스: 연합뉴스 RSS + Google Finance RSS (CORS 프록시 경유) ──────
function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000 / 60; // 분
  if (diff < 60)   return Math.round(diff) + '분 전';
  if (diff < 1440) return Math.round(diff / 60) + '시간 전';
  return Math.round(diff / 1440) + '일 전';
}

function guessTag(title) {
  const t = title + '';
  if (/코스피|코스닥|삼성|하이닉스|원화|환율|한국|코리아/.test(t)) return '국내시장';
  if (/연준|Fed|나스닥|S&P|미국|다우|월가|뉴욕|달러|트럼프/.test(t)) return '미국시장';
  return '거시경제';
}
function tagCls(tag) {
  return tag === '국내시장' ? 'tag-kr' : tag === '미국시장' ? 'tag-us' : 'tag-eco';
}

async function fetchRSS(rssUrl, sourceName) {
  const proxy = `https://corsproxy.io/?url=${encodeURIComponent(rssUrl)}`;
  const res   = await fetch(proxy);
  const text  = await res.text();
  const xml   = new DOMParser().parseFromString(text, 'text/xml');
  const items = [...xml.querySelectorAll('item')].slice(0, 4);
  return items.map(item => ({
    headline: item.querySelector('title')?.textContent?.trim() ?? '',
    summary:  (item.querySelector('description')?.textContent ?? '').replace(/<[^>]+>/g,'').trim().slice(0, 120) + '...',
    link:     item.querySelector('link')?.textContent?.trim() ?? '#',
    time:     timeAgo(item.querySelector('pubDate')?.textContent ?? ''),
    source:   sourceName,
    tag:      guessTag(item.querySelector('title')?.textContent ?? '')
  })).filter(n => n.headline);
}

async function loadNews() {
  const btn = document.getElementById('news-btn');
  btn.classList.add('spinning');
  document.getElementById('news-area').innerHTML = '<div class="loading-state"><div class="spinner"></div>최신 뉴스를 불러오는 중...</div>';

  try {
    // 연합뉴스 경제 RSS + 한국경제 RSS 병렬 요청
    const [yonhap, hankyung] = await Promise.allSettled([
      fetchRSS('https://www.yonhapnewstv.co.kr/browse/feed/', '연합뉴스TV'),
      fetchRSS('https://rss.hankyung.com/finance.xml', '한국경제'),
    ]);

    let news = [];
    if (yonhap.status   === 'fulfilled') news = news.concat(yonhap.value);
    if (hankyung.status === 'fulfilled') news = news.concat(hankyung.value);

    // 뉴스가 전혀 안 왔으면 폴백
    if (news.length === 0) throw new Error('RSS 로드 실패');

    // 최대 6개, 섞어서 표시
    news = news.slice(0, 6);
    renderNews(news);
  } catch(e) {
    // RSS 실패 시 샘플로 폴백
    renderNews(fallbackNews());
  } finally {
    btn.classList.remove('spinning');
  }
}

function renderNews(arr) {
  document.getElementById('news-area').innerHTML = '<div class="news-list">' +
    arr.map((item, i) => `
      <a class="news-card" href="${item.link || '#'}" target="_blank" rel="noopener" style="animation-delay:${i*0.05}s">

          <div class="news-headline">${item.headline}</div>

        </div>
      </a>`).join('') + '</div>';
}
